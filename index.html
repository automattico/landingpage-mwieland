  <script>
    (function () {
      const yearNode = document.getElementById("current-year");
      if (yearNode) yearNode.textContent = String(new Date().getFullYear());

      const i18n = {
        en: {
          subtitle: "IT Project Lead & Digital Strategist",
          line1: "Building systems that matter and last.",
          line2: "Operating between Europe and Latin America."
        },
        de: {
          subtitle: "IT Project Lead & Digital Strategist",
          line1: "Ich entwickle digitale Strukturen mit echtem Mehrwert und langfristiger Wirkung.",
          line2: "Zwischen Europa und Lateinamerika zu Hause."
        },
        es: {
          subtitle: "IT Project Lead & Digital Strategist",
          line1: "Diseño sistemas digitales con impacto real y vocación de permanencia.",
          line2: "Con actividad entre Europa y América Latina."
        },
        pt: {
          subtitle: "IT Project Lead & Digital Strategist",
          line1: "Desenvolvo sistemas digitais com impacto real e visão de longo prazo.",
          line2: "Atuando entre a Europa e a América Latina."
        }
      };

      const buttons = document.querySelectorAll("[data-lang]");
      const nodes = document.querySelectorAll("[data-i18n]");

      function setLang(lang) {
        const dict = i18n[lang] || i18n.en;
        nodes.forEach(el => {
          const key = el.getAttribute("data-i18n");
          if (dict[key]) el.textContent = dict[key];
        });
        document.documentElement.lang = lang;
        buttons.forEach(b => {
          b.setAttribute("aria-pressed", b.getAttribute("data-lang") === lang);
        });
      }

      let init = localStorage.getItem("mw_lang") || "en";
      setLang(init);

      buttons.forEach(btn => btn.addEventListener("click", () => {
        setLang(btn.getAttribute("data-lang"));
        localStorage.setItem("mw_lang", btn.getAttribute("data-lang"));
      }));
    })();
  </script>
